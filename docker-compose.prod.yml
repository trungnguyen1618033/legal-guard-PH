# Production trên Alibaba Cloud ECS — chỉ chạy app, KHÔNG dựng db/redis local.
# DB → Neon · Chat store → Upstash, đều cấu hình qua .env (DATABASE_URL, REDIS_URL...).
# Chạy: docker compose -f docker-compose.prod.yml up -d --build
services:
  app:
    build: .
    restart: unless-stopped       # ECS reboot / app crash → tự dậy lại
    env_file:
      - .env                      # toàn bộ key + DATABASE_URL (Neon) + REDIS_URL (Upstash)
    ports:
      - "80:8000"                 # phục vụ trực tiếp cổng 80 (đặt Nginx/HTTPS phía trước nếu cần)
    # KHÔNG mount code, KHÔNG --reload: chạy ảnh đã build (Dockerfile CMD = migrate + uvicorn).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
