name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QWEN_API_KEY: ""
      GEMINI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Test (pytest)
        run: uv run pytest -q
      # Eval gate offline (keyword precision/recall + groundedness trên golden set) — KHÔNG chặn build,
      # để thấy regression retrieval sớm mà không cần API key.
      - name: Eval (offline, non-blocking)
        continue-on-error: true
        run: uv run python -m evaluation.run_eval
