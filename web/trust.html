<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Độ tin cậy — Legal Guard</title>
<style>
  :root { --b:#0d6efd; --mut:#667; --line:#e3e6ea; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; max-width:760px; margin:0 auto;
         padding:24px 16px; color:#1a1d21; line-height:1.6; }
  h1 { font-size:23px; margin:0 0 4px; }
  .muted { color:var(--mut); }
  a { color:var(--b); }
  .card { border:1px solid var(--line); border-radius:10px; padding:16px; margin-top:16px; }
  .metric { display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid var(--line); }
  .metric:last-child { border-bottom:0; }
  .metric .v { font-weight:700; color:var(--b); white-space:nowrap; }
  .metric .n { font-size:13px; }
  .layer { padding:7px 0; border-bottom:1px solid var(--line); font-size:14.5px; }
  .layer:last-child { border-bottom:0; }
  .layer b { color:#14223a; }
  .warn { background:#fff8e6; border:1px solid #f0d68a; border-radius:8px; padding:10px 12px;
          font-size:13.5px; margin-top:16px; }
  #err { color:#c0392b; }
</style>
</head>
<body>
  <h1>🔎 Độ tin cậy của Legal Guard</h1>
  <p class="muted">Cách chúng tôi đảm bảo trả lời <b>có căn cứ, không bịa</b> — và số đo thực tế.
    <a href="/app">Rà soát HĐ</a> · <a href="/lookup">Tra cứu luật</a></p>
  <p id="err"></p>

  <div class="card">
    <h2 style="margin-top:0;font-size:17px">🛡️ Phương pháp đảm bảo</h2>
    <div id="methodology"></div>
  </div>

  <div class="card">
    <h2 style="margin-top:0;font-size:17px">📊 Số đo (golden set nội bộ)</h2>
    <div id="metrics"></div>
  </div>

  <div class="warn" id="disclaimer"></div>

<script>
const $ = id => document.getElementById(id);
const esc = s => { const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; };
(async () => {
  try {
    const r = await fetch('/trust.json');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    $('methodology').innerHTML = (d.methodology||[]).map(m =>
      `<div class="layer"><b>${esc(m.layer)}</b> — ${esc(m.desc)}</div>`).join('');
    $('metrics').innerHTML = (d.metrics||[]).map(m =>
      `<div class="metric"><div><div>${esc(m.name)}</div><div class="n muted">${esc(m.note)}</div></div>` +
      `<div class="v">${esc(m.value)}</div></div>`).join('');
    $('disclaimer').textContent = '⚠️ ' + (d.disclaimer||'');
  } catch (e) { $('err').textContent = 'Lỗi tải số liệu: ' + e.message; }
})();
</script>
</body>
</html>
